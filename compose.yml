services:
  keycloak:
    container_name: keycloak
    hostname: keycloak
    image: quay.io/keycloak/keycloak:latest
    environment:
      - TZ=${TZ}
      - KC_DB=postgres
      - KC_DB_URL_HOST=postgres
      - KC_DB_URL_PORT=5432
      - KC_DB_USERNAME=${KEYCLOAK_DB_USERNAME}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
      - KC_HOSTNAME=${DOMAIN_NAME}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_NAME}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      #- KC_HTTPS_CERTIFICATE_FILE=/opt/certs/${DOMAIN_NAME}.crt
      #- KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/certs/${DOMAIN_NAME}.key
    command:
      start
    restart: always
    ports:
      - 8443:8443
    volumes:
      - keycloak-volume:/opt/keycloak/data
    tty: true
    user: root
    depends_on:
      - postgres

  postgres:
    container_name: postgres
    image: postgres:17.7-trixie
    volumes:
      - db-store:/var/lib/postgresql/data
    environment:
      - TZ=${TZ}
      - POSTGRES_USER=${KEYCLOAK_DB_USERNAME}
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    restart: always

volumes:
  keycloak-volume:
  db-store:
